<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NeoHunt Job</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">NeoHunt</p>
          <h1>Job Post</h1>
        </div>
        <a class="icon-button" href="./" aria-label="Back to feed" title="Back to feed">B</a>
      </header>

      <main class="workspace single">
        <section id="jobPost" class="details job-post" aria-label="Job post">
          <p class="eyebrow">Loading</p>
          <h2>Loading job details...</h2>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
