<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NeoHunt</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">NeoHunt</p>
          <h1>Today's Matches</h1>
        </div>
        <button id="refreshButton" class="icon-button" type="button" aria-label="Refresh jobs" title="Refresh jobs">
          <span aria-hidden="true">R</span>
        </button>
      </header>

      <main class="workspace">
        <section class="feed" aria-label="Job matches">
          <div class="feed-tools">
            <label class="search-wrap">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Company, role, keyword">
            </label>
            <label class="select-wrap">
              <span>Score</span>
              <select id="scoreFilter">
                <option value="0">All</option>
                <option value="70">70%+</option>
                <option value="85">85%+</option>
                <option value="90">90%+</option>
              </select>
            </label>
          </div>

          <div class="summary-strip" aria-live="polite">
            <div>
              <strong id="matchCount">0</strong>
              <span>matches</span>
            </div>
            <div>
              <strong id="topScore">0%</strong>
              <span>top score</span>
            </div>
            <div>
              <strong id="lastSync">Waiting</strong>
              <span>last sync</span>
            </div>
          </div>

          <div id="jobList" class="job-list"></div>
          <p id="emptyState" class="empty-state" hidden>No matching jobs yet. Run the scraper and this board will fill up.</p>
        </section>

        <aside class="details" aria-label="Selected job details">
          <div id="detailsContent" class="details-content">
            <p class="eyebrow">Select a role</p>
            <h2>Pick a match to see the fit.</h2>
            <p class="muted">Scores come from the ranking layer, then the details show strengths, gaps, and the CV angle to lead with.</p>
          </div>
        </aside>
      </main>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
