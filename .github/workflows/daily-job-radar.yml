name: NeoHunt Job Scraper

on:
  schedule:
    # 03:00 UTC = 06:00 Kenya time and 11:00 UTC = 14:00 Kenya time.
    - cron: "0 3 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SUPABASE_URL: https://dqcpoxyadfsyfkvbgyen.supabase.co
  SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxY3BveHlhZGZzeWZrdmJneWVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA3NzY1MzYsImV4cCI6MjA2NjM1MjUzNn0.c8bV15lHma2TNBGzg9uzS0dcnhDojYXu7ITjm5BrfBY
  NEOHUNT_INGEST_TOKEN: 285ea77f7adae12334074d346540d5b6437929178d990080

jobs:
  scrape-to-supabase:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run Job Radar
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MIN_SCORE: ${{ secrets.MIN_SCORE }}
        run: python -m app.main
